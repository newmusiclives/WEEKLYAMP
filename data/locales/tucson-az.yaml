scene_facts:
  - claim: Craig Schumacher is a Tucson-based producer and audio engineer who has recorded and mixed albums by Calexico, Devotchka, Neko Case, Giant Sand, The Jayhawks, Friends of Dean Martinez, and Amos Lee.
    source_url: https://en.wikipedia.org/wiki/Craig_Schumacher
    verified_on: 2026-05-07

  - claim: The Tucson Folk Festival is in its 41st year in 2026, taking place April 10-12 at J&aacute;come Plaza in downtown Tucson, presented by the Tucson Kitchen Musicians Association.
    source_url: https://www.tucsonfolkfest.org/
    verified_on: 2026-05-07

  - claim: Solar Culture Gallery has operated as an art and performance space in a historic art-deco building in downtown Tucson since 1987.
    source_url: https://solarculture.org/
    verified_on: 2026-05-07

  - claim: Club Congress at Hotel Congress has been a downtown Tucson live music venue since 1985.
