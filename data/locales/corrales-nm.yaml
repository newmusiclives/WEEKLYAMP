scene_facts:
  - claim: Music in Corrales is in its 39th season in 2026, hosted at the Historic Old San Ysidro Church (966 Old Church Rd) under the Corrales Historical Society.
    source_url: https://www.corraleshistory.org/mic.html
    verified_on: 2026-05-07

  - claim: Outpost Performance Space and the New Mexico Jazz Workshop (founded 1976) merged on January 3, 2026, with both operating under the Outpost banner.
    source_url: https://outpostspace.org/
    verified_on: 2026-05-07

  - claim: Casa Vieja occupies an adobe building constructed in 1770 in the village of Corrales.
    source_url: https://oldcasanm.com/
    verified_on: 2026-05-07

  - claim: Frogville Studios in Santa Fe was officially established in 2003.
    source_url: https://frogvilleplanet.com/recording-studio/
    verified_on: 2026-05-07

