scene_facts:
  - claim: Sugar Lime Blue's founding bassist Russ Dean passed away in 2020. Joe Bass (also performing as Brian Howe) played bass during the band's interim period before the current rhythm section settled.
    source_url: https://www.bandsintown.com/a/1156877-sugar-lime-blue
    verified_on: 2026-05-07

  - claim: Sugar Lime Blue self-describes their style as &ldquo;Cosmic Cowgirl&rdquo; &mdash; a fusion of Americana, blues, folk, country, and jam-band grooves.
    source_url: https://indiebandguru.com/the-blackbird-sessions-sugar-lime-blue/
    verified_on: 2026-05-07

  - claim: The Blackbird Sessions (2022) was recorded at Blackbird Studio in Nashville and was picked up by more than 100 FM radio stations.
    source_url: https://sugarlimeblue.com/album/2238676/the-blackbird-sessions
    verified_on: 2026-05-07

  - claim: The band's name was first uttered by Dave Beth at home; Ashley Beth describes it as &ldquo;Sugar, the sweet stuff; Lime, the citrus fruit; Blue, the color.&rdquo;
    source_url: https://blues.gr/profiles/blogs/q-a-with-sugar-lime-blue-ashley-dave-beth-a-premiere-americana-so
    verified_on: 2026-05-07

  - claim: Sugar Lime Blue (and a Sugar Lime Blue Acoustic Duo configuration) is on a Summer '26 Tour as of May 2026, with confirmed shows announced through Bandsintown.
    source_url: https://www.bandsintown.com/a/1156877-sugar-lime-blue
    verified_on: 2026-05-07

