artist:
  name: Sugar Lime Blue
  hometown: Nashville, TN
  formation_year: 1999   # When Dave and Ashley Beth first met in Texas; the
                         # band's first official shows were in 2007.
  genre: Americana / blues / folk / country / jam (self-described as "Cosmic Cowgirl")
  current_status: active
  current_label: independent
  last_full_review: 2026-05-07

members:
  - name: Ashley Beth
    role: lead vocals
    era: current (founding)
    notes: Co-founder. Met Dave in Texas; the band emerged from her singing background vocals on his earlier project.
  - name: Dave Beth
    role: lead guitar
    era: current (founding)
    notes: Co-founder. Coined the band name "Sugar Lime Blue" at home with Ashley.
  - name: Matt Fox
    role: bass
    era: current
    notes: Listed as the current bassist on Bandsintown.
  - name: Ikaika Pekelo
    role: drums and percussion
    era: current
    notes: Listed as the current drummer on Bandsintown.
  - name: Russ Dean
    role: bass
    era: 2010-2020 (passed away 2020)
    notes: Founding-era bassist. Joined ~2010 after relocating from California to Nashville. Bonded with the Beths over a shared love of jam-band music, particularly the Grateful Dead.
  - name: Joe Bass
    role: bass
    era: interim (post-2020)
    notes: Played bass on tour for a period after Russ Dean's passing. Also performs as Brian Howe.

