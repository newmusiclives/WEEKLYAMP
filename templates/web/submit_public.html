<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to TrueFans NEWSLETTERS</title>
    <meta name="description" content="Submit your music, story, or guest article to TrueFans NEWSLETTERS and get featured in front of our growing readership.">
    <meta property="og:title" content="Submit to TrueFans NEWSLETTERS">
    <meta property="og:description" content="Share your new release, tour, or story with our community of independent artists.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://web-production-88ebc.up.railway.app/static/header-logo.png">
    <meta name="twitter:image" content="https://web-production-88ebc.up.railway.app/static/header-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/submit.css">
{% include "partials/analytics.html" %}
</head>
<body>
    <div class="container">
        <div class="brand">
            <h1>TrueFans NEWSLETTERS</h1>
            <p>for Industry Professionals, Music Artists and Fans</p>
        </div>

        {% if success %}
        <div class="alert alert-success">{{ message }}</div>
        {% elif error %}
        <div class="alert alert-error">{{ message }}</div>
        {% endif %}

        <div class="card">
            <h2>Submit Your Music</h2>
            <div class="subtitle">Share your new release, tour, or story with our community of independent artists.</div>

            <form method="post" action="/submit">
                <div class="row">
                    <div class="form-group">
                        <label for="artist_name" class="required">Artist / Band Name</label>
                        <input id="artist_name" name="artist_name" required placeholder="Your name or band name">
                    </div>
                    <div class="form-group">
                        <label for="artist_email" class="required">Email</label>
                        <input id="artist_email" name="artist_email" type="email" required placeholder="you@example.com">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="artist_website">Website</label>
                        <input id="artist_website" name="artist_website" type="url" placeholder="https://yoursite.com">
                    </div>
                    <div class="form-group">
                        <label for="artist_social">Social Media</label>
                        <input id="artist_social" name="artist_social" placeholder="@handle or URL">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="submission_type">Submission Type</label>
                        <select id="submission_type" name="submission_type">
                            <option value="new_release">New Release</option>
                            <option value="tour_promo">Tour / Live Shows</option>
                            <option value="artist_feature">Artist Feature</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="genre">Genre</label>
                        <input id="genre" name="genre" placeholder="e.g. Indie Folk, R&B, Pop">
                    </div>
                </div>

                <div class="form-group">
                    <label for="title">Title</label>
                    <input id="title" name="title" placeholder="Song, album, or tour name">
                </div>

                <div class="form-group">
                    <label for="description">Tell Us More</label>
                    <textarea id="description" name="description" placeholder="What makes this special? Share your story..."></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="release_date">Release Date</label>
                        <input id="release_date" name="release_date" type="date">
                    </div>
                    <div class="form-group">
                        <label for="links">Links</label>
                        <input id="links" name="links" placeholder="Spotify, YouTube, etc. (one per line)">
                    </div>
                </div>

                <button type="submit" class="btn">Submit for Review</button>
            </form>
        </div>
    </div>
</body>
</html>
