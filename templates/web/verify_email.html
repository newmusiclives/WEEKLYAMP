<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — TrueFans SIGNAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #0a0a12;
            --bg-card: #13131f;
            --border: rgba(255,255,255,0.08);
            --text: #f0f0f5;
            --text-dim: #9ca3af;
            --accent: #e8645a;
            --accent-hover: #f07a70;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }
        .nav-brand span { color: var(--accent); }
        .nav-link {
            color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
        .nav-link-cta { background: var(--accent); color: #fff; border-color: var(--accent); }
        .nav-link-cta:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .page-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 160px 24px 80px;
            text-align: center;
        }
        .page-content h1 {
            font-size: 36px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 16px;
        }
        .page-content p {
            font-size: 18px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.7;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 20px 24px;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px 24px;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .btn-link {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-link:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        footer {
            padding: 40px 24px; text-align: center;
            border-top: 1px solid var(--border); color: var(--text-dim); font-size: 14px;
        }
        .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; }
        .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 13px; }
        .footer-links a:hover { color: var(--text); }
        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            .page-content h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    {% include "partials/public_nav.html" %}

    <div class="page-content">
        <h1>Email Verification</h1>
        {% if success %}
        <div class="alert-success">Email verified! You're all set.</div>
        <p>Your email has been confirmed. You'll start receiving newsletters on your selected days.</p>
        {% elif error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}
    </div>

    {% include "partials/public_footer.html" %}
</body>
</html>
